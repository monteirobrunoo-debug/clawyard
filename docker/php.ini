; ClawYard dev php.ini — verbose errors, generous limits para debug local.
; NÃO usar em produção (display_errors=Off em prod).

display_errors = On
display_startup_errors = On
error_reporting = E_ALL
log_errors = On

memory_limit = 512M
max_execution_time = 180
post_max_size = 35M
upload_max_filesize = 35M

; OPcache: validar timestamps em dev (re-lê ficheiros mudados sem restart).
; Em prod é 0 (performance) — aqui 1 para o código novo pegar logo.
opcache.enable = 1
opcache.enable_cli = 1
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0
