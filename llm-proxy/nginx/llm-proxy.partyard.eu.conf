# PartYard LLM Proxy nginx vhost — terminates TLS on the DO droplet, then
# hands the (still-encrypted-in-memory) body to the FastAPI redactor on
# localhost:8787. The redactor scrubs PII and re-issues the request to
# Anthropic over HTTPS. nginx never speaks to Anthropic directly anymore.
#
# IMPORTANT: the FORGE CONFIG wrapper lines below are mandatory on
# Forge-managed servers. Do not remove them or Forge's next deploy will
# overwrite this vhost.

# FORGE CONFIG (DO NOT REMOVE!)
include forge-conf/3148742/before/*;
include forge-conf/3148742/llm-proxy.partyard.eu/before/*;

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name llm-proxy.partyard.eu;
    server_tokens off;

    ssl_certificate     /etc/nginx/ssl/domains/1526157/3353304/server.crt;
    ssl_certificate_key /etc/nginx/ssl/domains/1526157/3353304/server.key;
    ssl_protocols       TLSv1.3 TLSv1.2;

    access_log /var/log/nginx/llm-proxy.access.log;
    error_log  /var/log/nginx/llm-proxy.error.log warn;

    # 25 MB — PDF-heavy prompts still fit. Anything larger is almost
    # certainly a bug (a full PDF blob rather than extracted text).
    client_max_body_size 25m;

    # Long Opus runs stream for minutes. Keep these generous; the FastAPI
    # process will close cleanly if Anthropic does.
    proxy_connect_timeout 10s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;

    # SSE essentials — no buffering, no request buffering, chunked off so
    # uvicorn's streaming response reaches ClawYard in real time.
    proxy_http_version         1.1;
    proxy_buffering            off;
    proxy_cache                off;
    proxy_request_buffering    off;
    chunked_transfer_encoding  off;
    proxy_set_header Connection "";

    # Forward client identity to FastAPI (for access.jsonl). Trusted
    # because this vhost is only reachable from the app — see the
    # optional ACL below.
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID      $request_id;

    # Health — served by FastAPI itself, so we get an end-to-end check
    # (nginx + uvicorn + python import graph).
    location = /healthz {
        proxy_pass http://127.0.0.1:8787/healthz;
        access_log off;
    }

    location / {
        proxy_pass http://127.0.0.1:8787;
    }
}

# FORGE CONFIG (DO NOT REMOVE!)
include forge-conf/3148742/after/*;
include forge-conf/3148742/llm-proxy.partyard.eu/after/*;
