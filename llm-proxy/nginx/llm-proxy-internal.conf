# Internal LLM proxy vhost — for the SPLIT-VM topology only.
#
# Deploy on the new `clawyard-prox` droplet, at
# /etc/nginx/sites-available/llm-proxy-internal, and symlink into
# sites-enabled. Expects a self-signed cert at
# /etc/ssl/certs/llm-proxy-internal.crt (see doc/vm-separation.md §7).
#
# Security posture:
#   - Listens only on the DROPLET PRIVATE IP, not on 0.0.0.0. A
#     misconfigured DO firewall won't expose us to the public internet.
#   - Allows only the app VM's private IP by nginx ACL as well, so two
#     layers agree (firewall + nginx). Belt and braces.
#   - HMAC signature validation happens in the FastAPI app itself (see
#     llm-proxy/auth.py); this vhost just transports.
#   - Logs rejects to a separate file so `fail2ban` or `goaccess` can
#     flag unexpected peers.
#
# Replace PLACEHOLDERS with the real private IPs during deployment.

# Redirect bare HTTP → drop. We never speak plain HTTP on this VM.
server {
    listen 10.114.0.B:80 default_server;  # PROXY_PRIVATE_IP
    return 444;  # close connection without a response
}

server {
    listen 10.114.0.B:443 ssl;             # PROXY_PRIVATE_IP
    http2 on;
    server_name clawyard-prox.internal;
    server_tokens off;

    # Self-signed cert — rotate every 825 days (see vm-separation.md §7).
    ssl_certificate     /etc/ssl/certs/llm-proxy-internal.crt;
    ssl_certificate_key /etc/ssl/private/llm-proxy-internal.key;
    ssl_protocols       TLSv1.3 TLSv1.2;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Belt: allow only the app VM's private IP at nginx layer.
    # Braces: DO firewall already blocks everyone else, but we don't
    # trust the DO console alone for a security control.
    allow 10.114.0.A/32;                   # APP_PRIVATE_IP
    deny  all;

    access_log /var/log/nginx/llm-proxy-internal.access.log;
    error_log  /var/log/nginx/llm-proxy-internal.error.log warn;

    # If someone reaches us anyway, log them to a separate file so the
    # audit trail shows the attempt.
    # (nginx doesn't natively split by allow/deny outcome, so a log
    # grepper + the 403s in the main access log serve this purpose.)

    client_max_body_size 25m;

    proxy_connect_timeout 10s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;

    proxy_http_version         1.1;
    proxy_buffering            off;
    proxy_cache                off;
    proxy_request_buffering    off;
    chunked_transfer_encoding  off;
    proxy_set_header Connection "";

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID      $request_id;

    # The HMAC signature headers are already set by the Laravel client
    # (see app/Support/LlmProxyClient.php). nginx forwards them verbatim
    # — FastAPI validates them inside auth.py.

    location = /healthz {
        proxy_pass http://127.0.0.1:8787/healthz;
        access_log off;
    }

    location / {
        proxy_pass http://127.0.0.1:8787;
    }
}
