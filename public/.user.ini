; Disable PHP output buffering for real-time SSE streaming
output_buffering=Off
implicit_flush=On

; Force OPcache to check file timestamps on every request
opcache.validate_timestamps=1
opcache.revalidate_freq=0

; Allow large file uploads — PDF batches até 50 MB raw (~67 MB base64).
; post_max_size precisa ter cushion sobre upload_max_filesize para o
; envelope multipart + system prompt + history caberem.
upload_max_filesize=80M
post_max_size=100M
memory_limit=512M
